runs_dir: runs
mode: stub
seeds: [123]
max_workers: 1
fail_fast: false

tasks:
  - id: internal:code_param
  - id: internal:numeric_param
  - id: internal:multi_param
  - id: internal:non_trainable
  - id: trace_examples:greeting_stub
  - id: llm4ad:circle_packing
    eval_kwargs:
      timeout_seconds: 10
  - id: veribench:smoke_placeholder

trainers:
  - id: PrioritySearch
    params_variants:
      - threads: 2
        ps_steps: 1
        ps_batches: 1
        ps_candidates: 2
        ps_proposals: 2
        ps_mem_update: 1

  - id: GEPA-Base
    params_variants:
      - threads: 2
        gepa_iters: 1
        gepa_train_bs: 2
        gepa_merge_every: 2
        gepa_pareto_subset: 2
    optimizer: OPROv2
    optimizer_kwargs: {}

  - id: GEPA-UCB
    params_variants:
      - threads: 2
        gepa_iters: 1
        gepa_train_bs: 2
        gepa_merge_every: 2
        gepa_pareto_subset: 2

  - id: GEPA-Beam
    params_variants:
      - threads: 2
        gepa_iters: 1
        gepa_train_bs: 2
        gepa_merge_every: 2
        gepa_pareto_subset: 2

eval_kwargs:
  timeout_seconds: 10
