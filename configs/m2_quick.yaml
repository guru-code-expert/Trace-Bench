# M2 Quick Validation — 5 LLM4AD + 2 internal tasks, 1 trainer
# Light enough for free Colab (~2-5 min stub, ~10 min real)
mode: stub
seeds: [123]
max_workers: 2
resume: auto
job_timeout: 30

trainers:
  - id: PrioritySearch
    params_variants:
      - ps_steps: 1
        ps_batches: 1
        ps_candidates: 2
        ps_proposals: 2

tasks:
  # Internal (always work, fast)
  - id: internal:numeric_param
  - id: internal:code_param
  # Optimization — different domains
  - id: "llm4ad:circle_packing"
  - id: "llm4ad:optimization/knapsack_construct"
  - id: "llm4ad:optimization/bp_1d_construct"
  # Science discovery
  - id: "llm4ad:science_discovery/oscillator1"
  # Machine learning / RL
  - id: "llm4ad:machine_learning/acrobot"
