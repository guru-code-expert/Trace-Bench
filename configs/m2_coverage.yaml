# M2 Full LLM4AD Coverage
# 65 tasks x 2 trainers x 1 seed = 130 jobs
mode: stub
seeds: [123]
max_workers: 4
resume: auto
job_timeout: 30

trainers:
  - id: PrioritySearch
    params_variants:
      - ps_steps: 1
        ps_batches: 1
        ps_candidates: 2
        ps_proposals: 2
  - id: GEPA-Base
    params_variants:
      - gepa_iters: 1
        gepa_train_bs: 2
        gepa_merge_every: 2
        gepa_pareto_subset: 2

tasks:
