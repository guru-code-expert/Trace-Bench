# M2 Optimizing Subset
# 5 tasks that reliably work in real mode, 5 training steps.
# Designed to complete in ~15-20 min on free Colab.
mode: real
seeds: [123]
max_workers: 2
resume: auto
job_timeout: 600

trainers:
  - id: PrioritySearch
    params_variants:
      - ps_steps: 5
        ps_batches: 2
        ps_candidates: 3
        ps_proposals: 3

tasks:
  - id: "llm4ad:circle_packing"
  - id: "llm4ad:online_bin_packing_local"
  - id: "llm4ad:optimization/knapsack_construct"
  - id: "llm4ad:optimization/admissible_set"
  - id: "llm4ad:science_discovery/oscillator1"
